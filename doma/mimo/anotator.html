<!DOCTYPE html>
<html lang="cs">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Třídič matic · Chceš myš?</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { background: #fff; color: #111; font-family: 'Helvetica Neue', Arial, sans-serif; padding: 1.5rem; max-width: 1100px; margin: 0 auto; line-height: 1.4; }
    h1 { font-family: Georgia, serif; font-size: 2rem; font-weight: 400; margin-bottom: 0.2rem; }
    .sub { color: #555; margin-bottom: 1rem; font-size: 0.8rem; }
    .flex-row { display: flex; gap: 0.6rem; flex-wrap: wrap; align-items: center; margin-bottom: 1rem; }
    button, .btn { padding: 0.4rem 1rem; border: 1px solid #ccc; background: #f9f9f9; cursor: pointer; font-size: 0.75rem; font-family: inherit; }
    button:hover { background: #eee; }
    .chips { display: flex; flex-wrap: wrap; gap: 0.3rem; margin-bottom: 1rem; }
    .chip { padding: 0.3rem 0.8rem; border: 1px solid #ddd; cursor: pointer; font-size: 0.75rem; background: #fff; }
    .chip.active { background: #111; color: #fff; border-color: #111; }
    .url-input { flex: 1; min-width: 300px; padding: 0.4rem; border: 1px solid #ccc; font-family: monospace; font-size: 0.75rem; }
    table { border-collapse: collapse; width: 100%; margin-bottom: 2rem; font-size: 0.8rem; }
    th, td { border: 1px solid #ddd; padding: 0.4rem 0.6rem; text-align: left; vertical-align: top; }
    th { background: #f5f5f5; font-weight: 600; position: sticky; top: 0; }
    td { cursor: pointer; transition: background 0.2s; }
    td:hover { background: #ffffcc; }
    td.ok { background: #d4edda; }
    td.err { background: #f8d7da; }
    td.na { background: #f0f0f0; color: #999; }
    .legend { font-size: 0.7rem; display: flex; gap: 1rem; margin: 0.5rem 0 1rem; }
    .legend span { display: flex; align-items: center; gap: 0.3rem; }
    .legend .box { width: 14px; height: 14px; border: 1px solid #ccc; display: inline-block; }
    .status-text { font-size: 0.7rem; color: #555; margin-left: 1rem; }
  </style>
</head>
<body>
  <h1>📋 Třídič matic</h1>
  <div class="sub">Načti markdown tabulku z URL, vyber fenomény, kontroluj a označuj.</div>

  <div class="flex-row">
    <label style="font-size:0.7rem;">URL matice:</label>
    <input type="text" class="url-input" id="matrixUrl" value="https://raw.githubusercontent.com/artmisanovak-prog/chces-mys/main/doma/data/uhly/klice/husy_matice.md" placeholder="https://...matice.md">
    <button onclick="loadMatrix()">🔄 Načíst tabulku</button>
  </div>

  <div class="chips" id="cardChips"></div>

  <div class="legend">
    <span><span class="box" style="background:#d4edda;"></span> OK / sedí</span>
    <span><span class="box" style="background:#f8d7da;"></span> Nesedí / opravit</span>
    <span><span class="box" style="background:#f0f0f0;"></span> Prázdné</span>
    <span style="margin-left:auto;" id="statusText">Připraveno</span>
  </div>

  <div id="tableContainer"></div>

  <div class="flex-row">
    <button onclick="exportJSON()">⬇️ Exportovat stav</button>
    <button onclick="document.getElementById('importFile').click()">⬆️ Importovat stav</button>
    <input type="file" id="importFile" accept=".json" style="display:none;" onchange="importJSON(event)">
  </div>

  <script>
    // --- Seznam všech fenoménů ---
    const ALL_CARDS = [
      { id: "mys", jmeno: "Myš" }, { id: "zajic", jmeno: "Zajíc" }, { id: "kocour", jmeno: "Kocour" },
      { id: "ryba", jmeno: "Ryba" }, { id: "pav", jmeno: "Páv" }, { id: "motyl", jmeno: "Motýl" },
      { id: "netopyr", jmeno: "Netopýr" }, { id: "jednorozec", jmeno: "Jednorožec" }, { id: "plamenak", jmeno: "Plameňák" },
      { id: "kravy", jmeno: "Krávy" }, { id: "had", jmeno: "Had" }, { id: "slon", jmeno: "Slon" },
      { id: "liska", jmeno: "Liška" }, { id: "prase", jmeno: "Prase" }, { id: "osel", jmeno: "Osel" },
      { id: "pavouk", jmeno: "Pavouk" }, { id: "krokodyl", jmeno: "Krokodýl" }, { id: "veverka", jmeno: "Veverka" },
      { id: "zelva", jmeno: "Želva" }, { id: "cap", jmeno: "Čáp" }, { id: "lemur", jmeno: "Lemur" },
      { id: "parohy", jmeno: "Parohy" }
    ];

    let selectedCards = new Set(['mys', 'zajic', 'kocour', 'ryba', 'pav', 'motyl']);
    let matrixData = null; // { headers: [], rows: [] }
    let cellStatus = {}; // { "row-col": "ok" | "err" | "na" }

    function renderChips() {
      const container = document.getElementById('cardChips');
      container.innerHTML = '';
      ALL_CARDS.forEach(card => {
        const chip = document.createElement('span');
        chip.className = 'chip';
        if (selectedCards.has(card.id)) chip.classList.add('active');
        chip.textContent = card.jmeno;
        chip.onclick = () => {
          if (selectedCards.has(card.id)) selectedCards.delete(card.id);
          else selectedCards.add(card.id);
          renderChips();
          renderTable();
        };
        container.appendChild(chip);
      });
    }

    async function loadMatrix() {
      const url = document.getElementById('matrixUrl').value.trim();
      if (!url) return;
      document.getElementById('statusText').innerText = 'Načítám...';
      try {
        const resp = await fetch(url);
        if (!resp.ok) throw new Error('HTTP ' + resp.status);
        const md = await resp.text();
        parseMarkdownTable(md);
        document.getElementById('statusText').innerText = `Načteno: ${matrixData.rows.length} řádků`;
        renderTable();
      } catch (err) {
        document.getElementById('statusText').innerText = 'Chyba: ' + err.message;
      }
    }

    function parseMarkdownTable(md) {
      const lines = md.split('\n').filter(l => l.trim().startsWith('|'));
      if (lines.length < 2) { matrixData = null; return; }
      const headers = lines[0].split('|').map(h => h.trim()).filter(h => h !== '');
      const rows = [];
      for (let i = 2; i < lines.length; i++) {
        const cols = lines[i].split('|').map(c => c.trim()).filter(c => true);
        if (cols.length >= headers.length) {
          rows.push(cols.slice(0, headers.length));
        }
      }
      matrixData = { headers, rows };
    }

    function renderTable() {
      const container = document.getElementById('tableContainer');
      if (!matrixData) { container.innerHTML = '<p style="color:#888;">Žádná data. Načti tabulku.</p>'; return; }
      
      const filteredHeaders = matrixData.headers.filter((h, i) => {
        if (i === 0) return true;
        const hLower = h.toLowerCase();
        return Array.from(selectedCards).some(cardId => {
          const cardName = ALL_CARDS.find(c => c.id === cardId)?.jmeno.toLowerCase() || cardId;
          return hLower.includes(cardId) || hLower.includes(cardName);
        });
      });

      let html = '<table><thead><tr>';
      filteredHeaders.forEach(h => html += `<th>${h}</th>`);
      html += '</tr></thead><tbody>';

      matrixData.rows.forEach((row, rowIdx) => {
        html += '<tr>';
        filteredHeaders.forEach((h, colIdx) => {
          const origColIdx = matrixData.headers.indexOf(h);
          const val = row[origColIdx] || '';
          const cellKey = `${rowIdx}-${origColIdx}`;
          const status = cellStatus[cellKey] || 'na';
          let cssClass = '';
          if (status === 'ok') cssClass = 'ok';
          else if (status === 'err') cssClass = 'err';
          else if (!val.trim()) cssClass = 'na';
          html += `<td class="${cssClass}" onclick="toggleCell('${cellKey}')" title="Klikni pro změnu stavu">${val}</td>`;
        });
        html += '</tr>';
      });
      html += '</tbody></table>';
      container.innerHTML = html;
    }

    function toggleCell(key) {
      const current = cellStatus[key] || 'na';
      if (current === 'na') cellStatus[key] = 'ok';
      else if (current === 'ok') cellStatus[key] = 'err';
      else cellStatus[key] = 'na';
      renderTable();
    }

    function exportJSON() {
      const data = { matrixData, cellStatus, selectedCards: Array.from(selectedCards) };
      const blob = new Blob([JSON.stringify(data, null, 2)], { type: 'application/json' });
      const a = document.createElement('a'); a.href = URL.createObjectURL(blob);
      a.download = 'kontrola_matice.json'; a.click();
    }

    function importJSON(event) {
      const file = event.target.files[0];
      if (!file) return;
      const reader = new FileReader();
      reader.onload = e => {
        try {
          const data = JSON.parse(e.target.result);
          if (data.matrixData) matrixData = data.matrixData;
          if (data.cellStatus) cellStatus = data.cellStatus;
          if (data.selectedCards) {
            selectedCards = new Set(data.selectedCards);
            renderChips();
          }
          renderTable();
        } catch(ex) { alert('Chyba JSON'); }
      };
      reader.readAsText(file);
    }

    renderChips();
  </script>
</body>
</html>
